<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBO QA Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
        }

        /* ── 사이드바 ─────────────────────────────────────── */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .sidebar-logo h2 {
            color: white;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .sidebar-logo span {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            display: block;
            margin-top: 3px;
        }

        .sidebar-nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-section-label {
            color: rgba(255,255,255,0.45);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 0 8px;
            margin-bottom: 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            color: rgba(255,255,255,0.75);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            user-select: none;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            text-decoration: none;
        }

        .nav-item:hover { background: rgba(255,255,255,0.12); color: white; }
        .nav-item.active { background: rgba(255,255,255,0.2); color: white; font-weight: 600; }

        .nav-icon { font-size: 16px; width: 20px; text-align: center; }

        /* ── 메인 콘텐츠 ──────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .tool-section { display: none; flex: 1; flex-direction: column; height: 100%; }
        .tool-section.active { display: flex; }

        /* TC 생성기 iframe */
        #tc-frame {
            width: 100%;
            flex: 1;
            border: none;
        }

        /* 대시보드 섹션 */
        .dashboard-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .dashboard-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 40px;
            max-width: 560px;
            width: 100%;
        }

        .dashboard-card h1 { font-size: 24px; color: #1e1e2e; margin-bottom: 6px; }
        .dashboard-card .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 32px; }

        .field-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }

        .epic-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .epic-input:focus { border-color: #6366f1; }

        .create-btn {
            margin-top: 16px;
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .create-btn:hover { opacity: 0.9; }
        .create-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .log-box {
            margin-top: 24px;
            background: #1e1e2e;
            border-radius: 10px;
            padding: 16px 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #a6e3a1;
            min-height: 80px;
            line-height: 1.7;
            display: none;
        }

        .log-box.show { display: block; }

        .result-link-box {
            margin-top: 16px;
            padding: 16px 20px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            display: none;
        }

        .result-link-box.show { display: block; }
        .result-link-box p { font-size: 13px; color: #166534; margin-bottom: 8px; font-weight: 600; }
        .result-link-box a { color: #4f46e5; font-size: 13px; word-break: break-all; }
    </style>
</head>
<body>

    <!-- ── 사이드바 ── -->
    <nav class="sidebar">
        <div class="sidebar-logo">
            <h2>PBO QA Hub</h2>
            <span>QA 자동화 도구 모음</span>
        </div>
        <div class="sidebar-nav">
            <div class="nav-section-label">도구</div>
            <button class="nav-item" onclick="switchTool('tc-section', this)">
                <span class="nav-icon">📋</span> TC 생성기
            </button>
            <button class="nav-item active" id="nav-dashboard" onclick="switchTool('dashboard-section', this)">
                <span class="nav-icon">📊</span> Jira 대시보드
            </button>
        </div>
    </nav>

    <!-- ── 메인 콘텐츠 ── -->
    <div class="main-content">

        <!-- TC 생성기: iframe -->
        <div class="tool-section" id="tc-section">
            <iframe id="tc-frame" src="http://localhost:5000"></iframe>
        </div>

        <!-- Jira 대시보드 생성기 -->
        <div class="tool-section active" id="dashboard-section">
            <div class="dashboard-body">
                <div class="dashboard-card">
                    <h1>📊 Jira 대시보드 생성기</h1>
                    <p class="subtitle">에픽 티켓 번호만 입력하면 QA 대시보드를 자동으로 만들어드립니다.</p>

                    <label class="field-label" for="epicKey">에픽 티켓 번호</label>
                    <input class="epic-input" type="text" id="epicKey"
                           placeholder="예: OFFPRD-1000"
                           onkeydown="if(event.key==='Enter') createDashboard()">

                    <button class="create-btn" id="dashboardBtn" onclick="createDashboard()">
                        대시보드 생성
                    </button>

                    <div class="log-box" id="dashboardLog"></div>
                    <div class="result-link-box" id="dashboardResult">
                        <p>✅ 대시보드가 생성됐어요!</p>
                        <a id="dashboardUrl" href="#" target="_blank"></a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function switchTool(sectionId, btn) {
            document.querySelectorAll('.tool-section').forEach(function(s) { s.classList.remove('active'); });
            document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');
        }

        async function createDashboard() {
            var epicKey = document.getElementById('epicKey').value.trim().toUpperCase();
            if (!epicKey) { alert('에픽 티켓 번호를 입력해주세요.'); return; }

            var btn = document.getElementById('dashboardBtn');
            var log = document.getElementById('dashboardLog');
            var resultBox = document.getElementById('dashboardResult');

            btn.disabled = true;
            btn.textContent = '생성 중...';
            log.innerHTML = '⏳ 에픽 정보 조회 중...';
            log.classList.add('show');
            resultBox.classList.remove('show');

            try {
                var resp = await fetch('/api/create-dashboard', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({epic_key: epicKey})
                });
                var data = await resp.json();

                if (data.error) {
                    log.innerHTML = '<span style="color:#f38ba8">❌ ' + data.error + '</span>';
                } else {
                    log.innerHTML = data.log.replace(/\n/g, '<br>');
                    resultBox.classList.add('show');
                    document.getElementById('dashboardUrl').href = data.url;
                    document.getElementById('dashboardUrl').textContent = data.url;
                }
            } catch (e) {
                log.innerHTML = '<span style="color:#f38ba8">❌ 네트워크 오류: ' + e.message + '</span>';
            } finally {
                btn.disabled = false;
                btn.textContent = '대시보드 생성';
            }
        }
    </script>
</body>
</html>
